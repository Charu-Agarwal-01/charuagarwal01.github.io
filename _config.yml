about_content: | # this will include new lines to allow paragraphs
  With a master’s in mathematics from IIT Patna and a deep love for numbers, I’ve always been fascinated by patterns, logic, and solving complex problems. My academic journey gave me a strong foundation in statistics, probability, optimization, and linear algebra, all of which naturally led me to the world of data science, machine learning, and artificial intelligence.

  What started as a curiosity about how machines learn has become a passion. I enjoy building intelligent systems that can analyze data, uncover hidden insights, and make impactful predictions. Whether it's training deep learning models for image segmentation or exploring NLP for sentiment analysis, I love turning abstract math into real-world applications.

  My interests lie at the intersection of:

  - Machine Learning and Deep Learning  
  - Data Analysis and Visualization  
  - Computer Vision and NLP  
  - Mathematical Modeling and Optimization  

  I’m constantly learning, experimenting, and sharing what I know through projects, blogs, and dashboards.  
  My goal is to build meaningful AI solutions that combine theory with practice.

