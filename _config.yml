          - title: GitHub Repository
            icon: fab fa-github
            url: https://github.com/Charu-Agarwal-01/Harnessing-U-Net-and-Transfer-Learning-for-Satellite-Image-Segmentation
          - title: Medium Blog
            icon: fas fa-blog
            url: https://medium.com/@agarwalcharu2001/harnessing-u-net-transfer-learning-for-satellite-image-segmentation-9be693ac314a
        quote: >
          A deep learning-based semantic segmentation project using U-Net and VGG19 for extracting land cover features from satellite images.
        description: |
          This project explores the power of convolutional neural networks for semantic segmentation of high-resolution satellite imagery.
          I implemented both U-Net and VGG19-based U-Net architectures to identify urban and non-urban regions from aerial tiles.
          The pipeline involved data preprocessing, patch generation, augmentation, model training, and result visualization.
          Results showed strong accuracy and generalization due to data augmentation and transfer learning techniques.
